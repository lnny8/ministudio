<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <rect width="1200" height="675" rx="16" fill="#FAFAFA"/>
  <!-- Media Panel -->
  <rect x="24" y="24" width="200" height="420" rx="12" fill="#F0F0F0" stroke="#DDD" stroke-width="2"/>
  <text x="124" y="48" text-anchor="middle" fill="#BBB" font-size="13" font-family="system-ui">Media</text>
  <!-- Thumbnail grid in media panel -->
  <rect x="40" y="64" width="80" height="56" rx="6" fill="#E0E0E0"/>
  <rect x="128" y="64" width="80" height="56" rx="6" fill="#E0E0E0"/>
  <rect x="40" y="128" width="80" height="56" rx="6" fill="#2DA691" opacity="0.3"/>
  <rect x="128" y="128" width="80" height="56" rx="6" fill="#E0E0E0"/>
  <rect x="40" y="192" width="80" height="56" rx="6" fill="#E0E0E0"/>
  <rect x="128" y="192" width="80" height="56" rx="6" fill="#E0E0E0"/>
  <!-- Canvas -->
  <rect x="240" y="24" width="680" height="420" rx="12" fill="#FFFFFF" stroke="#DDD" stroke-width="2"/>
  <!-- Video frame on canvas -->
  <rect x="320" y="60" width="520" height="340" rx="8" fill="#1a1a1a"/>
  <!-- Play button -->
  <circle cx="580" cy="230" r="32" fill="white" opacity="0.15"/>
  <polygon points="570,212 570,248 598,230" fill="white" opacity="0.3"/>
  <!-- Captions on video -->
  <rect x="430" y="340" width="300" height="36" rx="6" fill="#2DA691" opacity="0.8"/>
  <rect x="460" y="350" width="240" height="16" rx="3" fill="white" opacity="0.6"/>
  <!-- Effects Panel -->
  <rect x="936" y="24" width="240" height="420" rx="12" fill="#F0F0F0" stroke="#DDD" stroke-width="2"/>
  <text x="1056" y="48" text-anchor="middle" fill="#BBB" font-size="13" font-family="system-ui">Effects</text>
  <!-- Effect controls -->
  <rect x="952" y="68" width="208" height="36" rx="8" fill="#E0E0E0"/>
  <rect x="952" y="112" width="208" height="36" rx="8" fill="#E0E0E0"/>
  <rect x="952" y="156" width="208" height="36" rx="8" fill="#2DA691" opacity="0.2"/>
  <rect x="952" y="200" width="208" height="36" rx="8" fill="#E0E0E0"/>
  <!-- Timeline -->
  <rect x="24" y="460" width="1152" height="192" rx="12" fill="#F0F0F0" stroke="#DDD" stroke-width="2"/>
  <!-- Playhead -->
  <line x1="400" y1="460" x2="400" y2="652" stroke="#2DA691" stroke-width="2"/>
  <circle cx="400" cy="465" r="6" fill="#2DA691"/>
  <!-- Timeline tracks -->
  <rect x="40" y="484" width="320" height="32" rx="6" fill="#2DA691" opacity="0.4"/>
  <rect x="380" y="484" width="240" height="32" rx="6" fill="#2DA691" opacity="0.3"/>
  <rect x="640" y="484" width="180" height="32" rx="6" fill="#2DA691" opacity="0.25"/>
  <rect x="40" y="524" width="200" height="32" rx="6" fill="#AAA" opacity="0.3"/>
  <rect x="260" y="524" width="360" height="32" rx="6" fill="#AAA" opacity="0.25"/>
  <rect x="40" y="564" width="500" height="28" rx="6" fill="#DDD" opacity="0.5"/>
  <!-- Audio waveform hint -->
  <rect x="44" y="600" width="4" height="16" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="52" y="604" width="4" height="8" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="60" y="598" width="4" height="20" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="68" y="602" width="4" height="12" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="76" y="596" width="4" height="24" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="84" y="600" width="4" height="16" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="92" y="604" width="4" height="8" rx="1" fill="#AAA" opacity="0.3"/>
  <rect x="100" y="598" width="4" height="20" rx="1" fill="#AAA" opacity="0.3"/>
</svg>
